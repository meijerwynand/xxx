services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5060:5060/udp"
      - "10000-10010:10000-10010/udp"  # Smaller RTP port range
    volumes:
      - ./config:/etc/asterisk
    environment:
      - SIP_PROVIDER_HOST=sip.provider.com
      - SIP_PROVIDER_USERNAME=your_username
      - SIP_PROVIDER_PASSWORD=your_password
