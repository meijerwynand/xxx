services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asterisk-container
    # ports:
    #   - "5060:5060/udp"
    #   - "5060:5060/tcp"
    #   - "10000-10100:10000-10100/udp"
    volumes:
      - ./config:/etc/asterisk
      - ./logs:/var/log/asterisk
      - ./spool:/var/spool/asterisk
    environment:
      - TZ=America/New_York  # Set your timezone here

networks:
  default:
    driver: bridge
